<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>إنشاء صفحة التحقق</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f3f5f7;
direction:rtl;
}

.creator{
display:flex;
justify-content:center;
align-items:center;
padding:40px 15px;
min-height:100vh;
}

.form-box{
width:100%;
max-width:700px;
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 5px 25px rgba(0,0,0,.08);
}

.form-box h2{
text-align:center;
margin-bottom:25px;
}

.form-box input{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;
font-size:18px;
}

.form-box button{
width:100%;
padding:15px;
background:#4c8ee8;
color:#fff;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
margin-top:8px;
}

#resultLink{
background:#f7f7f7;
}

#qrcode{
display:flex;
justify-content:center;
margin-top:20px;
}

.container{
display:none;
justify-content:center;
padding:30px 15px;
}

.card{
width:100%;
max-width:760px;
background:#fff;
border-radius:14px;
overflow:hidden;
box-shadow:0 5px 25px rgba(0,0,0,.08);
}

.card-header{
padding:25px;
border-bottom:1px solid #eee;
text-align:center;
}

.card-header h1{
font-size:34px;
}

.data-box{
padding:30px;
}

.row{
margin-bottom:18px;
font-size:22px;
}

.label{
font-weight:bold;
}

.status{
color:#4c8ee8;
font-weight:bold;
}

.back-btn{
width:100%;
padding:15px;
background:#4c8ee8;
color:#fff;
border:none;
font-size:18px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="creator" class="creator">

<div class="form-box">

<h2>إنشاء صفحة التحقق</h2>

<input id="room" placeholder="اسم الغرفة" value="غرفة أبها">
<input id="company" placeholder="اسم المنشأة">
<input id="unified" placeholder="الرقم الموحد">
<input id="request" placeholder="رقم الطلب">
<input id="type" placeholder="نوع الطلب">
<input id="owner" placeholder="اسم مقدم الطلب">
<input id="create" placeholder="تاريخ إنشاء الطلب">
<input id="amount" placeholder="المبلغ">
<input id="expire" placeholder="تاريخ الصلاحية">
<input id="cr" placeholder="السجل التجاري">
<input id="statusInput" placeholder="الحالة" value="تم قبول الطلب وساري">

<button onclick="generateLink()">إنشاء الرابط</button>

<input id="resultLink" readonly>

<div id="qrcode"></div>

<button onclick="openPage()">فتح صفحة التحقق</button>

</div>

</div><div id="verify" class="container">

<div class="card">

<div class="card-header">
<h1>التحقق من الوثيقة</h1>
</div>

<div class="data-box">

<div class="row"><span class="label">الغرفة:</span> <span id="v_room"></span></div>

<div class="row"><span class="label">المنشأة:</span> <span id="v_company"></span></div>

<div class="row"><span class="label">الرقم الموحد:</span> <span id="v_unified"></span></div>

<div class="row"><span class="label">رقم الطلب:</span> <span id="v_request"></span></div>

<div class="row"><span class="label">نوع الطلب:</span> <span id="v_type"></span></div>

<div class="row"><span class="label">اسم مقدم الطلب:</span> <span id="v_owner"></span></div>

<div class="row"><span class="label">تاريخ الإنشاء:</span> <span id="v_create"></span></div>

<div class="row"><span class="label">المبلغ:</span> <span id="v_amount"></span></div>

<div class="row"><span class="label">الصلاحية:</span> <span id="v_expire"></span></div>

<div class="row"><span class="label">السجل التجاري:</span> <span id="v_cr"></span></div>

<div class="row"><span class="label">الحالة:</span> <span id="v_status" class="status"></span></div>

<button class="back-btn" onclick="location.href=location.pathname">
رجوع
</button>

</div>

</div>

</div>

<script>

function generateLink(){

const data={
room:room.value,
company:company.value,
unified:unified.value,
request:request.value,
type:type.value,
owner:owner.value,
create:create.value,
amount:amount.value,
expire:expire.value,
cr:cr.value,
status:statusInput.value
};

const params=new URLSearchParams(data);

const url=location.origin+location.pathname+"?"+params.toString();

resultLink.value=url;

const qr=document.getElementById("qrcode");

qr.innerHTML="";
const qr=document.getElementById("qrcode");

qr.innerHTML="";

const canvas=document.createElement("canvas");

QRCode.toCanvas(
canvas,
url,
{
width:1200,
margin:2,
errorCorrectionLevel:"L"
},
function(err){

if(err){
console.error(err);
return;
}

qr.appendChild(canvas);

}
);

}
);

}function openPage(){

if(!resultLink.value){
alert("اضغط إنشاء الرابط أولاً");
return;
}

window.open(resultLink.value,"_blank");

}

window.onload=function(){

const p=new URLSearchParams(location.search);

if(p.toString()){

creator.style.display="none";
verify.style.display="flex";

document.getElementById("v_room").textContent=p.get("room")||"-";
document.getElementById("v_company").textContent=p.get("company")||"-";
document.getElementById("v_unified").textContent=p.get("unified")||"-";
document.getElementById("v_request").textContent=p.get("request")||"-";
document.getElementById("v_type").textContent=p.get("type")||"-";
document.getElementById("v_owner").textContent=p.get("owner")||"-";
document.getElementById("v_create").textContent=p.get("create")||"-";
document.getElementById("v_amount").textContent=p.get("amount")||"-";
document.getElementById("v_expire").textContent=p.get("expire")||"-";
document.getElementById("v_cr").textContent=p.get("cr")||"-";
document.getElementById("v_status").textContent=p.get("status")||"-";

}

}

</script>

</body>
</html>
