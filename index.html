<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>التحقق من الوثيقة</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Cairo,sans-serif;
}

body{
background:#f5f7fb;
padding:20px;
}

.box{
max-width:750px;
margin:auto;
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

h1{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
font-size:18px;
border:1px solid #ddd;
border-radius:8px;
margin-bottom:15px;
}

button{
width:100%;
padding:15px;
font-size:18px;
background:#1976d2;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
margin-bottom:10px;
}

#result{
background:#f2f2f2;
}

#qrcode{
display:flex;
justify-content:center;
margin-top:20px;
}

#viewer{
display:none;
}

.row{
font-size:22px;
margin-bottom:16px;
}

.label{
font-weight:bold;
}

.status{
color:#0066ff;
font-weight:bold;
}

</style>

</head>

<body><div id="creator" class="box">

<h1>إنشاء رابط التحقق</h1>

<input id="request" type="text" placeholder="اكتب رقم الطلب">

<button id="btnCreate">إنشاء الرابط</button>

<input id="result" readonly placeholder="سيظهر الرابط هنا">

<div id="qrcode"></div>

<button id="btnOpen">فتح صفحة التحقق</button>

</div>

<div id="viewer" class="box">

<h1>التحقق من الوثيقة</h1>

<div class="row"><span class="label">الغرفة:</span> <span id="v_room"></span></div>

<div class="row"><span class="label">المنشأة:</span> <span id="v_company"></span></div>

<div class="row"><span class="label">الرقم الموحد:</span> <span id="v_unified"></span></div>

<div class="row"><span class="label">رقم الطلب:</span> <span id="v_request"></span></div>

<div class="row"><span class="label">نوع الطلب:</span> <span id="v_type"></span></div>

<div class="row"><span class="label">اسم مقدم الطلب:</span> <span id="v_owner"></span></div>

<div class="row"><span class="label">تاريخ الإنشاء:</span> <span id="v_create"></span></div>

<div class="row"><span class="label">المبلغ:</span> <span id="v_amount"></span></div>

<div class="row"><span class="label">الصلاحية:</span> <span id="v_expire"></span></div>

<div class="row"><span class="label">السجل التجاري:</span> <span id="v_cr"></span></div>

<div class="row"><span class="label">الحالة:</span> <span class="status" id="v_status"></span></div>

</div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCwk455aMBlFYJWOmM8jtdpnweD11SiFzw",
  authDomain: "verify-cd6c1.firebaseapp.com",
  projectId: "verify-cd6c1",
  storageBucket: "verify-cd6c1.firebasestorage.app",
  messagingSenderId: "417325060071",
  appId: "1:417325060071:web:54d0dc11c78defc659b742"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const request = document.getElementById("request");
const result = document.getElementById("result");
const qr = document.getElementById("qrcode");

document.getElementById("btnCreate").addEventListener("click", () => {

  const id = request.value.trim();

  if (!id) {
    alert("اكتب رقم الطلب");
    return;
  }

  const url = location.origin + location.pathname + "?id=" + id;

  result.value = url;

  qr.innerHTML = "";

  QRCode.toCanvas(url, {
    width: 220,
    margin: 1
  }, function (err, canvas) {

    if (err) {
      console.error(err);
      return;
    }

    qr.appendChild(canvas);

  });

});

document.getElementById("btnOpen").addEventListener("click", () => {

  if (result.value === "") {
    alert("أنشئ الرابط أولاً");
    return;
  }

  location.href = result.value;

});

const id = new URLSearchParams(location.search).get("id");

if (id) {

  document.getElementById("creator").style.display = "none";
  document.getElementById("viewer").style.display = "block";

  try {

    const snap = await getDoc(doc(db, "requests", id));

    if (!snap.exists()) {
      alert("الطلب غير موجود");
    } else {

      const d = snap.data();
document.getElementById("v_room").textContent = d.Room ?? "-";
document.getElementById("v_company").textContent = d.Company ?? "-";
document.getElementById("v_unified").textContent = d.unified ?? "-";
document.getElementById("v_request").textContent = d.request ?? id;
document.getElementById("v_type").textContent = d.type ?? "-";
document.getElementById("v_owner").textContent = d.owner ?? "-";
document.getElementById("v_create").textContent = d.create ?? "-";
document.getElementById("v_amount").textContent = d.amount ?? "-";
document.getElementById("v_expire").textContent = d.expire ?? "-";
document.getElementById("v_cr").textContent = d.cr ?? "-";
document.getElementById("v_status").textContent = d.status ?? "-";

    }

  } catch (e) {
    console.error(e);
    alert("خطأ: " + e.message);
  }

}

</script>

</body>
</html>
